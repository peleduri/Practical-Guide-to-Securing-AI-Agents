# GitHub Pages config. Serves the wiki as a browsable site from `main`.
title: Practical Guide to Securing AI Agents
description: >-
  A security engineer's playbook for defending agentic AI coding assistants
  across laptops, remote workspaces, and GPU/sandbox clouds. An LLM Wiki.
# minima renders from site.title/description and does NOT touch jekyll-github-metadata,
# so the build can't fail on a live GitHub API call (that failure broke the cayman build).
# A richer themed/search site is tracked in the README Roadmap.
theme: minima

# Curate the masthead. Without this, minima auto-lists EVERY titled page in the
# header (all parts + template-tree pages), string-sorted so Part 10/11/12 fall
# before Part 2 — a link-soup that fills the top of the landing page. Pin the three
# navigational anchors instead; the parts are reached via the Index page's Guide list.
header_pages:
  - start-here.md
  - index.md
  - glossary.md

# jekyll-relative-links rewrites the wiki's relative .md links (e.g. ../index.md,
# part-2-...md) to the correct site URLs, so the same links work on github.com
# AND on the rendered Pages site. Both plugins are supported on GitHub Pages.
plugins:
  - jekyll-relative-links
  - jekyll-sitemap
relative_links:
  enabled: true
  collections: false

# Repo-oriented files that should not become site pages.
exclude:
  - scripts/
  - LICENSE
  - LICENSE-CODE
  - CLAUDE.md
  - .github/
