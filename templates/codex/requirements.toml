# Codex managed requirements — EXAMPLE. Adapt and test before delivering via MDM
# (macOS profile domain: com.openai.codex). Verify the exact key names and allowed
# enum values against the current Codex docs before you rely on this — the vendor
# surface changes. This mirrors the Claude Code managed-settings baseline in
# ../claude-code/managed-settings.json: human-in-the-loop, sandboxed, admin-only hooks.
# See Part 2: https://peleduri.github.io/Practical-Guide-to-Securing-AI-Agents/wiki/part-2-endpoint-hardening-and-policy-playbook.html

# Restrict which approval policies a user may select. Exclude any policy that
# removes the human confirmation step. (Confirm the valid values in your Codex version.)
allowed_approval_policies = ["untrusted", "on-request", "on-failure"]

# Restrict sandbox modes. Do NOT include "danger-full-access" — that is the escape hatch.
allowed_sandbox_modes = ["read-only", "workspace-write"]

# Load only administrator-approved hooks; a user- or bundle-supplied hook cannot run.
allow_managed_hooks_only = true
