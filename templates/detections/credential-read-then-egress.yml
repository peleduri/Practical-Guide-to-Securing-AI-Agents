# EXAMPLE Sigma correlation. Map field names to your telemetry and tune the timespan.
# The highest-value agent detection (Part 1 / Part 9): a secret read followed by an
# outbound call from the same agent within a short window.
title: Agent reads a credential path
name: agent_credential_read
status: experimental
logsource:
  category: file_event
detection:
  sel:
    # map to your file-read/audit field; these are the sensitive paths the Part 2 hook also gates
    TargetFilename|contains:
      - '/.aws/'
      - '/.ssh/'
      - '/.config/gcloud/'
      - '.env'
      - 'credentials'
      - '.pem'
      - '.key'
  condition: sel
---
title: Agent makes an outbound network connection
name: agent_outbound_connection
status: experimental
logsource:
  category: network_connection
detection:
  sel:
    Initiated: 'true'
  filter_internal:
    # exclude known-good/allowlisted destinations (the egress allowlist from Parts 3/4)
    DestinationIsAllowlisted: 'true'
  condition: sel and not filter_internal
---
title: Credential read then egress by the same agent
id: 5f3b9a2e-0c7d-4e51-9a3c-agentcred001
status: experimental
description: >-
  A read of a credential path followed by an outbound connection from the same agent
  within the window. This is the Part 1 attack path (untrusted input -> read secret ->
  exfil); it is the highest-value agent detection.
correlation:
  type: temporal
  rules:
    - agent_credential_read
    - agent_outbound_connection
  group-by:
    - agent_id
  timespan: 5m
level: high
tags:
  - attack.exfiltration
  - attack.credential_access
