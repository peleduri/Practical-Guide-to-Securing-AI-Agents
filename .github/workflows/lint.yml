name: wiki-lint

# Least privilege: this workflow only reads the repo. The GITHUB_TOKEN is
# granted no write scopes, so a compromised step cannot push, comment, or
# alter the repo. (This is the Part 6 / Part 10 principle applied to our own CI.)
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    # `pull_request` (NOT `pull_request_target`): a PR from a fork runs with a
    # read-only token and NO access to repo secrets, so a malicious PR cannot
    # exfiltrate anything or gain write access. Never switch this to
    # pull_request_target for a public repo without a hard reason.

# Cancel superseded runs on the same ref so a force-push doesn't pile up jobs.
concurrency:
  group: wiki-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Pin to a full commit SHA, not a moving tag: a tag can be repointed at
      # malicious code (tag-hijack supply-chain attack); a SHA cannot.
      # Pinned to actions/checkout v4.2.2.
      - name: Check out the wiki
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false   # don't leave the token in .git/config
      - name: Lint links and orphans
        run: bash scripts/lint.sh

  # Freshness guard against control-rot: agent tooling changes fast, so every push
  # re-proves that the shipped controls still parse, stay shellcheck-clean, and that
  # the scorecard renderer still works. A control that breaks fails the build instead
  # of rotting silently in a repo people copy from.
  controls:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the wiki
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Install shellcheck and jq
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq
      - name: Shellcheck every template and script (warning+)
        run: |
          fail=0
          while IFS= read -r f; do
            shellcheck -S warning "$f" || fail=1
          done < <(find templates skill scripts -name '*.sh' -type f)
          exit "$fail"
      - name: Scorecard renderer smoke test
        run: |
          out=$(bash skill/agentic-ai-hardening/scripts/scorecard.sh examples/posture.json)
          printf '%s' "$out" | grep -q 'agent%20security-' || { echo "no maturity badge rendered"; exit 1; }
          printf '%s' "$out" | grep -q 'Maturity:'        || { echo "no maturity rendered"; exit 1; }
      - name: The two discovery copies must stay identical
        run: cmp templates/discovery/inventory-agents.sh skill/agentic-ai-hardening/scripts/inventory-agents.sh
